name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard against iCloud conflict copies
        run: |
          dups=$(find . -path ./node_modules -prune -o \( -name "* [0-9]" -o -name "* [0-9].*" \) -print)
          if [ -n "$dups" ]; then echo "iCloud conflict copies committed:"; echo "$dups"; exit 1; fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
